title: "개발 문서"
description: "프로젝트 기술 문서 모음"
baseurl: "/note"
url: "https://jyshinAnt.github.io"

# 단순한 문서 테마
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

# Markdown 설정
markdown: kramdown

# 포함/제외 설정
include:
  - docs
exclude:
  - README.md
  - .git
  - .github
  - Gemfile
  - Gemfile.lock