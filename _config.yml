title: "개발 문서"
description: "프로젝트 기술 문서 모음"
baseurl: "/note"
url: "https://jyshinAnt.github.io"

# 문서 전용 테마 (GitHub Pages에서 지원)
remote_theme: just-the-docs/just-the-docs

# Markdown 설정
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# 문서 구조
aux_links:
  "GitHub Repository": "https://github.com/jyshinAnt/note"

# 검색 활성화
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# 목차 자동 생성
heading_anchors: true

# 상단 브레드크럼 네비게이션 비활성화
breadcrumb_nav_enabled: false

# 포함/제외 설정
include:
  - docs
exclude:
  - README.md
  - .git
  - .github
  - Gemfile
  - Gemfile.lock